version: '3.8'

services:
  # Microservicio Principal (Java Spring Boot)
  jce-app:
    build: .
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=jce-mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-jce_consulta_db}
      - DB_USER=${DB_USER:-jce_user}
      - DB_PASSWORD=${DB_PASSWORD:-jce_password_secure}
      - REDIS_HOST=jce-redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_jwt_key_at_least_32_characters_long}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
    depends_on:
      - jce-mysql
      - jce-redis
    # Easypanel manejará la exposición del puerto 8080 vía Proxy
    expose:
      - 8080

  # Base de Datos (MySQL)
  jce-mysql:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_DATABASE=${DB_NAME:-jce_consulta_db}
      - MYSQL_USER=${DB_USER:-jce_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-jce_password_secure}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-jce_root_password_secure}
    volumes:
      - jce-db-data:/var/lib/mysql

  # Caché Distribuido (Redis)
  jce-redis:
    image: redis:7.0-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - jce-redis-data:/data

volumes:
  jce-db-data:
  jce-redis-data:
